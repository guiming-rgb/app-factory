# submit-app-store.yml
#
# 手动触发的 App Store 提交流程
# 从 Spec → 生成 → 准备素材 → 构建 → 验证 → 提交
#
# 用法:
#   gh workflow run submit-app-store.yml \
#     -f app_name="MyApp" \
#     -f platform="flutter_ios" \
#     -f store="testflight"
#
# 依赖 Secrets:
#   Fastlane / App Store Connect / Google Play
#
name: 提交 App Store

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: App 名称
        required: true
        type: string
      platform:
        description: 发布目标平台
        required: true
        type: choice
        options:
          - flutter_ios
          - flutter_android
      store:
        description: 目标商店渠道
        required: true
        type: choice
        options:
          - testflight
          - production
      version:
        description: 版本号（semver，如 1.0.0）
        required: false
        type: string
        default: "1.0.0"
      build_number:
        description: Build 号（可选。不提供则使用 github.run_number）
        required: false
        type: string
      spec_b64:
        description: Base64 编码的 App Spec JSON（可选）
        required: false
        type: string
      changelog:
        description: 更新说明
        required: false
        type: string
        default: "首次提交"
      primary_color:
        description: 主色调（如 #4F46E5）
        required: false
        type: string
        default: "#4F46E5"
      app_desc:
        description: App 简短描述
        required: false
        type: string
        default: "Generated by App Factory"

# 同平台串行，避免冲突
concurrency:
  group: store-submit-${{ inputs.platform }}-${{ inputs.app_name }}
  cancel-in-progress: false

env:
  APP_NAME: ${{ inputs.app_name }}
  PLATFORM: ${{ inputs.platform }}
  STORE: ${{ inputs.store }}
  VERSION: ${{ inputs.version || '1.0.0' }}
  BUILD_NUMBER: ${{ inputs.build_number || github.run_number }}
  CHANGELOG: ${{ inputs.changelog || '首次提交' }}
  PRIMARY_COLOR: ${{ inputs.primary_color || '#4F46E5' }}
  APP_DESC: ${{ inputs.app_desc || 'Generated by App Factory' }}

jobs:
  # ═══════════════════════════════════════════════════
  # 准备工作
  # ═══════════════════════════════════════════════════
  prepare:
    name: 准备提交素材
    runs-on: ubuntu-latest
    outputs:
      store-assets-path: /tmp/store-assets
      project-path: /tmp/generated-app

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 生成 App 代码
        env:
          SPEC_B64: ${{ inputs.spec_b64 }}
        run: |
          if [ -n "$SPEC_B64" ]; then
            echo "$SPEC_B64" | base64 -d > /tmp/spec.json
          else
            # 如果没有 spec，创建最小 spec 用于生成占位项目
            cat > /tmp/spec.json << EOF
            {
              "specVersion": "0.1.0",
              "appName": "${APP_NAME}",
              "displayName": "${APP_NAME}",
              "targets": {
                "flutter": { "enabled": true, "platforms": ["ios", "android"], "formFactors": ["phone"] },
                "wechatMiniProgram": { "enabled": false },
                "harmony": { "enabled": false },
                "backend": { "provider": "supabase" }
              },
              "screens": [
                { "id": "home", "title": "首页", "type": "tabRoot" },
                { "id": "profile", "title": "我的", "type": "placeholder" }
              ],
              "entities": [],
              "navigation": { "tabs": ["home", "profile"] },
              "metadata": { "category": "general" }
            }
            EOF
          fi

          # 生成 Flutter 项目
          npx tsx scripts/codegen-flutter.ts --spec /tmp/spec.json --out /tmp/generated-app 2>&1 || {
            echo "⚠ codegen-flutter 失败，创建占位项目用于素材准备"
            mkdir -p /tmp/generated-app
            echo "placeholder" > /tmp/generated-app/README.md
          }

      - name: 生成商店提交素材
        run: |
          node scripts/prepare-app-store-submission.mjs \
            --project /tmp/generated-app \
            --store "${{ inputs.platform == 'flutter_ios' && 'ios' || 'android' }}" \
            --name "$APP_NAME" \
            --desc "$APP_DESC" \
            --color "$PRIMARY_COLOR" \
            --out /tmp/store-assets

      - name: 上传素材产物
        uses: actions/upload-artifact@v4
        with:
          name: store-assets-${{ inputs.app_name }}
          path: /tmp/store-assets
          retention-days: 7

      - name: 上传项目代码
        uses: actions/upload-artifact@v4
        with:
          name: generated-app-${{ inputs.app_name }}
          path: /tmp/generated-app
          retention-days: 7

      - name: 列出生成的文件
        run: |
          echo "══  Store Assets  ══"
          find /tmp/store-assets -type f | sort

  # ═══════════════════════════════════════════════════
  # iOS 构建 + 提交
  # ═══════════════════════════════════════════════════
  build-ios:
    name: iOS 构建 + 提交 (${{ inputs.store }})
    needs: [prepare]
    if: inputs.platform == 'flutter_ios'
    runs-on: macos-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: 下载项目代码
        uses: actions/download-artifact@v4
        with:
          name: generated-app-${{ inputs.app_name }}
          path: /tmp/generated-app

      - name: 下载 Store Assets
        uses: actions/download-artifact@v4
        with:
          name: store-assets-${{ inputs.app_name }}
          path: /tmp/store-assets

      - name: 安装 fastlane
        run: gem install fastlane -NV

      # 仅提交时导入证书
      - name: 导入 iOS 证书与 Provisioning Profile
        if: inputs.store == 'testflight' || inputs.store == 'production'
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROV_PROFILE_BASE64: ${{ secrets.IOS_PROV_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: store-submit-${{ github.run_id }}
        run: |
          set -euxo pipefail
          echo "$IOS_CERT_BASE64" | base64 -d > /tmp/dist.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" /tmp/publish.keychain
          security default-keychain -s /tmp/publish.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" /tmp/publish.keychain
          security import /tmp/dist.p12 -k /tmp/publish.keychain \
            -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s \
            -k "$KEYCHAIN_PASSWORD" /tmp/publish.keychain
          echo "$IOS_PROV_PROFILE_BASE64" | base64 -d > /tmp/profile.mobileprovision
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(grep -aA1 UUID /tmp/profile.mobileprovision | grep -oE '[0-9A-F-]{36}')
          cp /tmp/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "✅ iOS 证书与 profile 已导入 (UUID: $UUID)"

      # 将生成的图标替换到 Xcode 项目
      - name: 替换 App 图标
        run: |
          IOS_ICONS_DIR="/tmp/generated-app/ios/Runner/Assets.xcassets/AppIcon.appiconset"
          if [ -d "$IOS_ICONS_DIR" ]; then
            # 复制生成的图标到 Xcode Assets
            find /tmp/store-assets/icons/ios -type f | while read icon; do
              basename=$(basename "$icon")
              # 尝试匹配 Xcode 项目中期望的文件名
              target="$IOS_ICONS_DIR/$basename"
              cp "$icon" "$target" 2>/dev/null || true
            done
            echo "✅ iOS 图标已替换"
          else
            echo "⚠ 未找到 iOS AppIcon.appiconset 目录"
          fi

      - name: 构建 iOS Release 产物
        run: |
          cd /tmp/generated-app
          flutter pub get
          flutter build ios --release --no-codesign
          # 生成 IPA（Archive → Export）
          mkdir -p build/ios/ipa
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SYMROOT=build/ios 2>&1 | tail -20

      - name: 运行测试
        continue-on-error: true
        run: |
          cd /tmp/generated-app
          flutter test || echo "⚠ 部分测试失败（继续流程）"

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ inputs.app_name }}
          path: /tmp/generated-app/build/ios/ipa/*.ipa
          retention-days: 7

      # 提交到 App Store Connect
      - name: "Fastlane Pilot — 提交至 App Store Connect (${{ inputs.store }})"
        if: inputs.store == 'testflight' || inputs.store == 'production'
        env:
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.ASC_KEY_P8 }}
        run: |
          IPA_PATH=$(find /tmp/generated-app/build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            # 直接使用 build/ios/iphoneos 下的 .app 或通过 xcarchive
            IPA_PATH="/tmp/generated-app/build/ios/iphoneos/Runner.app"
          fi

          SUBMIT_FLAGS=""
          if [ "${{ inputs.store }}" = "testflight" ]; then
            SUBMIT_FLAGS="--distribute_only true --skip_waiting_for_build_processing false"
          else
            SUBMIT_FLAGS="--distribute_only true --skip_waiting_for_build_processing true"
          fi

          cd /tmp/generated-app/ios
          fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --changelog "$CHANGELOG" \
            $SUBMIT_FLAGS \
            --wait_for_processing true || {
            echo "⚠ fastlane pilot upload 结果非零，查看日志"
          }

      - name: 评论提交状态
        uses: actions/github-script@v7
        with:
          script: |
            const message = [
              `## 🍏 iOS 提交流程完成`,
              ``,
              `**App**: ${{ inputs.app_name }}`,
              `**版本**: ${{ env.VERSION }} (build ${{ env.BUILD_NUMBER }})`,
              `**目标**: ${{ inputs.store }}`,
              `**更新说明**: ${{ inputs.changelog }}`,
              ``,
              `[查看运行日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              `[下载产物](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number || context.sha,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            }).catch(() => console.log('评论写入失败（可能非 PR 上下文）'));

  # ═══════════════════════════════════════════════════
  # Android 构建 + 提交
  # ═══════════════════════════════════════════════════
  build-android:
    name: Android 构建 + 提交 (${{ inputs.store }})
    needs: [prepare]
    if: inputs.platform == 'flutter_android'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: 下载项目代码
        uses: actions/download-artifact@v4
        with:
          name: generated-app-${{ inputs.app_name }}
          path: /tmp/generated-app

      - name: 下载 Store Assets
        uses: actions/download-artifact@v4
        with:
          name: store-assets-${{ inputs.app_name }}
          path: /tmp/store-assets

      # 替换 Android 图标
      - name: 替换 Android 图标
        run: |
          ANDROID_RES_DIR="/tmp/generated-app/android/app/src/main/res"
          if [ -d "$ANDROID_RES_DIR" ]; then
            # mipmap-mdpi
            cp /tmp/store-assets/icons/android/ic_launcher_mdpi.png \
              "$ANDROID_RES_DIR/mipmap-mdpi/ic_launcher.png" 2>/dev/null || true
            cp /tmp/store-assets/icons/android/ic_launcher_hdpi.png \
              "$ANDROID_RES_DIR/mipmap-hdpi/ic_launcher.png" 2>/dev/null || true
            cp /tmp/store-assets/icons/android/ic_launcher_xhdpi.png \
              "$ANDROID_RES_DIR/mipmap-xhdpi/ic_launcher.png" 2>/dev/null || true
            cp /tmp/store-assets/icons/android/ic_launcher_xxhdpi.png \
              "$ANDROID_RES_DIR/mipmap-xxhdpi/ic_launcher.png" 2>/dev/null || true
            cp /tmp/store-assets/icons/android/ic_launcher_xxxhdpi.png \
              "$ANDROID_RES_DIR/mipmap-xxxhdpi/ic_launcher.png" 2>/dev/null || true
            echo "✅ Android 图标已替换"
          else
            echo "⚠ 未找到 Android res 目录"
          fi

      # 导入签名密钥（提交时需要）
      - name: 导入 Android 签名密钥
        if: inputs.store == 'testflight' || inputs.store == 'production'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euxo pipefail
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > /tmp/generated-app/android/app/upload-keystore.jks
            cat > /tmp/generated-app/android/key.properties << EOF
            storePassword=$KEYSTORE_PASSWORD
            keyPassword=$KEY_PASSWORD
            keyAlias=$KEY_ALIAS
            storeFile=upload-keystore.jks
            EOF
            echo "✅ Android 签名密钥已导入"
          else
            echo "⚠ 未配置 Android 签名密钥，将使用 debug 签名"
          fi

      - name: 构建 Android Release AAB
        run: |
          cd /tmp/generated-app
          flutter pub get
          flutter build appbundle --release

      - name: 运行测试
        continue-on-error: true
        run: |
          cd /tmp/generated-app
          flutter test || echo "⚠ 部分测试失败（继续流程）"

      - name: 上传 AAB 产物
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ inputs.app_name }}
          path: /tmp/generated-app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      # 提交到 Google Play
      - name: "Fastlane Supply — 提交至 Google Play (${{ inputs.store }})"
        if: inputs.store == 'testflight' || inputs.store == 'production'
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          AAB_PATH="/tmp/generated-app/build/app/outputs/bundle/release/app-release.aab"
          if [ ! -f "$AAB_PATH" ]; then
            echo "❌ AAB 文件不存在: $AAB_PATH"
            exit 1
          fi

          gem install fastlane -NV

          TRACK="internal"
          RELEASE_STATUS="draft"
          if [ "${{ inputs.store }}" = "production" ]; then
            TRACK="production"
            RELEASE_STATUS="draft"
          fi

          echo "$SUPPLY_JSON_KEY_DATA" > /tmp/gplay-creds.json
          cd /tmp/generated-app/android
          fastlane supply \
            --aab "$AAB_PATH" \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true \
            --json_key /tmp/gplay-creds.json \
            --release_status "$RELEASE_STATUS" \
            --track "$TRACK" \
            --version_code "$BUILD_NUMBER" \
            --version_name "$VERSION" || {
            echo "⚠ fastlane supply 结果非零"
          }

      - name: 评论提交状态
        uses: actions/github-script@v7
        with:
          script: |
            const message = [
              `## 🤖 Android 提交流程完成`,
              ``,
              `**App**: ${{ inputs.app_name }}`,
              `**版本**: ${{ env.VERSION }} (build ${{ env.BUILD_NUMBER }})`,
              `**目标**: ${{ inputs.store }}`,
              `**更新说明**: ${{ inputs.changelog }}`,
              ``,
              `[查看运行日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              `[下载产物](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number || context.sha,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            }).catch(() => console.log('评论写入失败（可能非 PR 上下文）'));
