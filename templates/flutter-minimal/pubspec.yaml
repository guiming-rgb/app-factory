name: app_factory_minimal
description: "App 生产工厂 Flutter 最小模板（v2a）。由 App Spec 驱动 Generator 扩展。"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  supabase_flutter: ^2.9.0
  fl_chart: ^0.70.2
  table_calendar: ^3.1.3
  shared_preferences: ^2.5.3
  intl: ^0.19.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/core/i18n/
